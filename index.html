<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://kit.fontawesome.com/c4254e24a8.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="logo"><span>Your Personal Sound</span></div>
      <button id="sidebar-close" style="background:none;border:none;color:#fff;font-size:1.5rem;display:none;cursor:pointer;" aria-label="Close Sidebar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="section-label">Playlist</div>
      <div class="playlist" id="playlist"></div>
    </div>
  </aside>
    <div class="player-container">
        <div class="music-player">
            
            <nav>
                <div class="circle">
                  <i class="fa-solid fa-bars" id="sidebar-toggle"></i>
                </div>
            </nav>
            <!-- Album Art -->
                 <div class="album-art">
                    <img id="cover" src="assets/covers/Best-Album-Covers.jpg" alt="Album Cover">
                 </div>
             <!-- Song Info -->
               <div class="song-info">
                <h2 id="title">Song Title</h2>
                 <p id="artist">Artist Name</p>
              </div>
              <div class="visualizer">
                <div></div><div></div><div></div><div></div><div></div>
                </div>
               <!-- Progress Bar -->
         <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
         </div>
         <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
         </div>
         
        <!-- Playback Controls -->
         <div class="controls">
            <button id="prev-btn" class="control-btn play-btn">
                <i class="fas fa-backward"></i>
            </button>
            <button id="play-btn" class="control-btn play-btn">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
            <button id="next-btn" class="control-btn play-btn">
                <i class="fas fa-forward"></i>
            </button>
         </div>
           <!-- Volume Control -->
            <div class="volume-container">
                <i class="fas fa-volume-down" id="volume-icon"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
                <span id="volume-display">50</span>
                <i class="fas fa-volume-up" id="volume-icon"></i>
            </div>
       </div> 
    </div>

    <audio id="audio"></audio>
    <script src="js/script.js"></script>
</body>
</html>
